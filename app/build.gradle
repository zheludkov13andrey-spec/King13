plugins {
    id 'com.android.application'
}

android {
    namespace 'com.king13.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.king13.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
}
