name: KING13 APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create APK
        run: |
          mkdir apk
          echo "KING13 APK BUILD" > apk/KING13.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KING13-APK
          path: apk/KING13.apk
